<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display in CSS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 
    Display:
        >> inline (span, a)
        >> block (p, h1-h6, div, forms, ul, ol, li)
        >> inline-block (img)
        >> none
    -->

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Sign In</a></li>
            <li><a href="#">Sign Up</a></li>
        </ul>
    </nav>

    <h4 style="background-color: purple;">
            <span style="color: orange;">Lorem</span> 
            <span style="color: white;">ipsum</span> 
            <span style="color: green;">dolor</span>
    </h4>

    <p>
            Lorem ipsum dolor sit amet.
    </p>
    <p>
            Lorem ipsum dolor sit amet consectetur adipisicing.
    </p>

    <span>Lorem ipsum dolor sit amet.</span>
    <span>Lorem ipsum dolor sit amet.</span>
    <span>Lorem ipsum dolor sit amet consectetur adipisicing.</span>
    <!-- will come in the same line because span is inline by default -->

    <a href="">Click on me</a>
    <img
        src="https://florista.in/cdn/shop/files/TrueBlueOrchids.png?v=1748248188" 
        alt="Blue Orchids">

</body>
</html>
