<!-- Boiler Plate -->
<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms In HTML</title>
</head>
<body>
    <h2>Forms in HTML:</h2>
    <form action="">
        <label for="fname">First name: </label>
        <!-- <p>Enter you first name: </p> thisassigns proper block to overcome you can use label or do not use any tag at all-->
        <!-- type="text" is default, length specifires (minlength & maxlength) and mandatory is made by "required" -->
        <input type="text" id="fname" minlength="5" maxlength="12" required/>

        <label for="mname">Middle name:</label>
        <input type="text" id="mname" minlength="5" maxlength="12" value="RK" />
        

        <label for="lname">Last name:</label>
        <input type="text" id="lname" minlength="5" maxlength="12" disabled/>
        <br><br>

        <label for="">Age:</label>
        <input type="number" />
        <br><br>

        <label for="">Email:</label>
        <input type="email" />
        <br><br>

        <label for="">Date of Joining:</label>
        <input type="date"/>
        <br><br>

        <label for="">Password:</label>
        <input type="password" />
        <br><br>

        <p>Enter your Shirt Size:</p>
        <input type="radio" name="ShirtSize" id="small"/><label for="small">Small Size</label>
        <input type="radio" name="ShirtSize" id="medium" checked/><label for="medium">Medium Size</label>
        <input type="radio" name="ShirtSize" id="large"/><label for="large">Large Size</label>
        <!-- here, name exact same name for multiple options specifies that we can select only one option of all -->

        <br><br>
        <label for="color">Please select the color for your shirt:</label>
        <input type="color" name="" id="color">

        <!-- DropDown Box -->
        <label for="paymentOption">Please select a payment method:</label>
        <select name="payment" id="paymentOption">
            <option value=""></option>  <!-- To keep the select box empty bydefault instead of gPay -->
            <option value="gPay">gPay</option>
            <option value="PhonePay">PhonePay</option>
            <option value="UPI">UPI</option>
            <option value="COD">COD</option>
        </select>

        <br><br>
        <label for="CMTS">Please provide your valuable feedback:</label>
        <!-- Input type text -->
         <textarea name="cmts" id="CMTS"></textarea>
    </form>
</body>
</html>
